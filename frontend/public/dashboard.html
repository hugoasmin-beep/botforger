<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — BotForge</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .activity-table { width: 100%; border-collapse: collapse; }
    .activity-table th { text-align: left; font-size: 0.68rem; font-weight: 800; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; padding: 0 0.75rem 0.6rem; border-bottom: 1px solid var(--border); }
    .activity-table td { padding: 0.72rem 0.75rem; font-size: 0.83rem; color: var(--text-2); border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    .activity-table tr:last-child td { border-bottom: none; }
    .activity-table tr:hover td { background: rgba(255,255,255,0.015); }
    .activity-table td:first-child { color: var(--text); font-weight: 700; }
    .quick-actions { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.8rem; margin-bottom: 2rem; }
    .quick-action { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.1rem; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 0.75rem; transition: all var(--t); }
    .quick-action:hover { border-color: rgba(124,102,255,0.3); transform: translateY(-1px); background: var(--card-hover); }
    .quick-action-icon { width: 36px; height: 36px; border-radius: 9px; background: var(--accent-dim); border: 1px solid rgba(124,102,255,0.18); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .quick-action-title { font-size: 0.85rem; font-weight: 700; }
    .quick-action-desc  { font-size: 0.73rem; color: var(--text-2); margin-top: 0.08rem; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .section-title { font-family: var(--font-display); font-size: 1rem; font-weight: 800; }
  </style>
</head>
<body>
<div id="sidebar-container"></div>

<div class="app-layout">
  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title" id="welcome-msg">Dashboard</h1>
        <p class="page-subtitle">Bienvenue ! Voici l'état de vos bots.</p>
      </div>
      <a href="/create-bot.html" class="btn btn-primary">✦ Nouveau bot</a>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-icon">🟢</span>
        <div class="stat-label">Bots actifs</div>
        <div class="stat-value" id="stat-active-bots">—</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">💬</span>
        <div class="stat-label">Messages totaux</div>
        <div class="stat-value" id="stat-total-messages">—</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">👥</span>
        <div class="stat-label">Utilisateurs actifs</div>
        <div class="stat-value" id="stat-total-users">—</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">🤖</span>
        <div class="stat-label">Bots créés / limite</div>
        <div class="stat-value" id="stat-total-bots">—</div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions">
      <a href="/create-bot.html" class="quick-action">
        <span class="quick-action-icon">✦</span>
        <div><div class="quick-action-title">Nouveau bot</div><div class="quick-action-desc">Démarrer en 2 minutes</div></div>
      </a>
      <a href="/bots.html" class="quick-action">
        <span class="quick-action-icon">🤖</span>
        <div><div class="quick-action-title">Mes bots</div><div class="quick-action-desc">Gérer et configurer</div></div>
      </a>
    </div>

    <!-- Bots récents -->
    <div class="section-header">
      <span class="section-title">Bots récents</span>
      <a href="/bots.html" class="btn btn-ghost btn-sm">Voir tous →</a>
    </div>

    <div class="card" id="bots-container">
      <div style="display:flex;align-items:center;justify-content:center;gap:0.75rem;padding:2rem;color:var(--text-2);">
        <div class="loader-spinner"></div> Chargement...
      </div>
    </div>

  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (!initLayout()) return;

    const user = Auth.getUser();
    if (user) {
      document.getElementById('welcome-msg').textContent = `Bonjour, ${user.email.split('@')[0]} 👋`;
    }

    const data = await api('/bots');
    if (!data?.success) {
      document.getElementById('bots-container').innerHTML = '<div class="alert alert-error">Erreur lors du chargement des bots</div>';
      return;
    }

    const bots = data.bots;
    const limit = user?.botsLimit || 3;

    document.getElementById('stat-total-bots').textContent = `${bots.length} / ${limit}`;
    document.getElementById('stat-active-bots').textContent = bots.filter(b => b.isActive).length;
    document.getElementById('stat-total-messages').textContent = formatNumber(bots.reduce((a,b) => a + (b.stats?.totalMessages||0), 0));
    document.getElementById('stat-total-users').textContent = formatNumber(bots.reduce((a,b) => a + (b.stats?.activeUsers||0), 0));

    if (!bots.length) {
      document.getElementById('bots-container').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🤖</div>
          <div class="empty-title">Aucun bot encore</div>
          <div class="empty-desc">Créez votre premier bot Telegram en quelques minutes.</div>
          <a href="/create-bot.html" class="btn btn-primary">✦ Créer mon premier bot</a>
        </div>`;
      return;
    }

    const recentBots = bots.slice(0, 5);
    document.getElementById('bots-container').innerHTML = `
      <table class="activity-table">
        <thead><tr>
          <th>Nom</th><th>Template</th><th>Statut</th><th>Messages</th><th>Dernière activité</th><th></th>
        </tr></thead>
        <tbody>
          ${recentBots.map(bot => {
            const tpl = TEMPLATES[bot.template] || { emoji: '🤖', name: bot.template };
            return `<tr>
              <td>
                <div style="font-family:var(--font-display);font-weight:700;font-size:0.88rem;">${bot.name}</div>
                ${bot.telegramUsername ? `<div style="font-family:var(--font-mono);font-size:0.68rem;color:var(--text-3);">@${bot.telegramUsername}</div>` : ''}
              </td>
              <td><span class="bot-template-badge">${tpl.emoji} ${tpl.name}</span></td>
              <td>
                <div style="display:flex;align-items:center;gap:0.4rem;">
                  <span class="status-dot ${bot.isActive ? 'active' : 'inactive'}"></span>
                  <span style="color:${bot.isActive ? 'var(--green)' : 'var(--text-3)'};">${bot.isActive ? 'Actif' : 'Off'}</span>
                </div>
              </td>
              <td style="font-family:var(--font-display);font-weight:700;">${formatNumber(bot.stats?.totalMessages||0)}</td>
              <td>${bot.stats?.lastActivity ? formatDate(bot.stats.lastActivity) : '—'}</td>
              <td><a href="/bot-detail.html?id=${bot._id}" class="btn btn-secondary btn-sm">Gérer →</a></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  });
</script>
</body>
</html>
