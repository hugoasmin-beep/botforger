<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer un compte — BotForge</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

<div class="auth-card">
  <a href="/" class="auth-logo">
    <span class="logo-icon" style="width:32px;height:32px;background:linear-gradient(135deg,#00d4ff,#0090cc);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 0 20px rgba(0,212,255,0.4);">🤖</span>
    BotForge
  </a>

  <h1 class="auth-title">Créer votre compte</h1>
  <p class="auth-subtitle">Gratuit · 3 bots inclus · Aucune carte requise</p>

  <div id="alert-container"></div>

  <form id="register-form">
    <div class="form-group">
      <label class="form-label">Email <span class="required">*</span></label>
      <input
        type="email"
        class="form-control"
        id="email"
        placeholder="vous@exemple.com"
        autocomplete="email"
        required
      />
    </div>

    <div class="form-group">
      <label class="form-label">Mot de passe <span class="required">*</span></label>
      <input
        type="password"
        class="form-control"
        id="password"
        placeholder="Minimum 8 caractères"
        autocomplete="new-password"
        required
      />
      <div class="form-hint">Minimum 8 caractères avec au moins un chiffre</div>
    </div>

    <div class="form-group">
      <label class="form-label">Confirmer le mot de passe <span class="required">*</span></label>
      <input
        type="password"
        class="form-control"
        id="password-confirm"
        placeholder="Répétez votre mot de passe"
        autocomplete="new-password"
        required
      />
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;" id="submit-btn">
      Créer mon compte
    </button>
  </form>

  <p class="auth-switch">
    Déjà un compte ? <a href="/login.html">Se connecter</a>
  </p>
</div>

<script>
  const API = '/api';

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('password-confirm').value;
    const btn = document.getElementById('submit-btn');
    const alertContainer = document.getElementById('alert-container');

    // Validation côté client
    alertContainer.innerHTML = '';

    if (password !== passwordConfirm) {
      alertContainer.innerHTML = '<div class="alert alert-error">⚠️ Les mots de passe ne correspondent pas</div>';
      return;
    }

    if (password.length < 8) {
      alertContainer.innerHTML = '<div class="alert alert-error">⚠️ Minimum 8 caractères</div>';
      return;
    }

    if (!/\d/.test(password)) {
      alertContainer.innerHTML = '<div class="alert alert-error">⚠️ Le mot de passe doit contenir au moins un chiffre</div>';
      return;
    }

    btn.classList.add('btn-loading');
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem('bf_token', data.token);
        localStorage.setItem('bf_user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } else {
        const errorMsg = data.errors
          ? data.errors.map(e => e.msg).join(', ')
          : data.error;
        alertContainer.innerHTML = `<div class="alert alert-error">⚠️ ${errorMsg}</div>`;
      }
    } catch (err) {
      alertContainer.innerHTML = '<div class="alert alert-error">⚠️ Erreur de connexion au serveur</div>';
    } finally {
      btn.classList.remove('btn-loading');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
