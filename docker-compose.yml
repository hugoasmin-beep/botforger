version: '3.9'

services:
  app:
    build: ./backend
    container_name: botforge_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/botforge
      JWT_SECRET: ${JWT_SECRET}
      SITE_URL: ${SITE_URL}
    depends_on:
      - mongo
    volumes:
      - ./frontend:/app/../frontend  # sert les fichiers statiques

  mongo:
    image: mongo:7
    container_name: botforge_mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"   # optionnel, retirez si vous ne voulez pas exposer Mongo

volumes:
  mongo_data:
